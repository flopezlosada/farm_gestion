name: csa-vega
type: symfony
docroot: public
php_version: "7.4"
webserver_type: nginx-fpm
xdebug_enabled: false
additional_hostnames: []
additional_fqdns: []
database:
  type: mysql
  version: "8.0"
use_dns_when_possible: true
composer_version: "2.2"  # LTS, compatible con la Flex 1.12.2 de la composer.lock
nodejs_version: "16"
web_environment:
  - APP_ENV=dev
  # DATABASE_URL ya viene de .env / .env.local; no se exporta aquí para que
  # .env.test (entorno test) pueda sobrescribirla con su propia BBDD.
  - MAILER_URL=smtp://localhost:1025
hooks:
  post-start:
    # composer install se hace a mano la primera vez para resolver issues
    # de allow-plugins interactivamente. Una vez verde, descomentar:
    # - exec: composer install --no-interaction
    - exec: echo "Container listo. Lanza 'ddev composer install' a mano."
# Notas:
# - PHP 7.4 elegido a propósito: es el mayor PHP con el que la composer.lock
#   de marzo 2021 instala sin pelearse. Una vez verde, subiremos a 8.x progresivamente.
# - MySQL 8.0 (la prod usa 5.7, EOL). Doctrine es agnóstico, no debería romper.
# - nodejs_version: 16 para que Webpack Encore antiguo funcione. También se moverá luego.
