name: Deploy a staging

# Disparo manual desde la pestaña Actions con "Run workflow". Permite elegir
# cualquier rama del repo: el flujo típico es desplegar una rama de trabajo a
# staging para que el equipo la pruebe antes de mergear a main.
on:
  workflow_dispatch:

# Evita que dos pushes seguidos se pisen.
concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    name: Build y subida por FTP a staging
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, pdo_mysql, gd, exif, iconv
          tools: composer:2.2
          coverage: none

      # Cachea vendor/ entre runs. Si composer.lock no cambia, actions/cache
      # restaura el directorio y nos saltamos composer install entero.
      - name: Cache de vendor/
        id: vendor-cache
        uses: actions/cache@v4
        with:
          path: vendor
          key: vendor-php83-${{ hashFiles('composer.lock') }}

      - name: Composer install (solo deps de producción)
        if: steps.vendor-cache.outputs.cache-hit != 'true'
        env:
          APP_ENV: prod
          APP_DEBUG: '0'
        run: composer install --no-dev --optimize-autoloader --no-interaction --no-progress

      - name: Setup Node 16
        uses: actions/setup-node@v4
        with:
          node-version: '16'

      - name: Compilar assets para producción
        run: |
          npm install --no-audit --no-fund
          npm run build || npm run dev

      # SIEMPRE (no gated por la cache de vendor): genera public/bundles/<bundle> para los
      # bundles registrados (adesignscalendar, ckeditor, fos_js_routing…). Antes solo corría
      # vía el post-cmd de `composer install`, que se SALTA cuando la cache de vendor acierta;
      # en esos runs public/bundles/adesignscalendar NO se generaba y el delta por hashes lo
      # marcaba para BORRAR → FTP 550 al hacer RMD de una carpeta que en el servidor existe
      # (y no está vacía). Correrlo siempre mantiene el árbol del runner coherente con el server.
      - name: Instalar assets de bundles (assets:install)
        env:
          APP_ENV: prod
          APP_DEBUG: '0'
        run: php bin/console assets:install public --no-interaction

      - name: Copiar assets legacy (FTP no transmite symlinks)
        run: |
          mkdir -p public/bundles
          rm -rf public/bundles/app
          cp -R src/Resources/public public/bundles/app
          # El repo tiene src/Resources/public/ en 0700 y cp -R lo preserva.
          # Apache en cdmon corre como otro usuario y necesita +rX para servir.
          chmod -R u+rwX,go+rX public/bundles/app

      # Subida por DELTA basada en hashes de contenido (SamKirkland/FTP-Deploy-Action).
      # La action mantiene un .ftp-deploy-sync-state.json en el servidor con el hash de
      # cada fichero; en cada run compara contra el estado LOCAL (calculado en el runner,
      # sin recorrer el árbol remoto) y sube SOLO lo que cambió. Sustituye al lftp mirror,
      # que recorría los ~21k ficheros (vendor = 71%) por FTP en secuencial y tardaba ~1h50m.
      #
      # PRIMER RUN: si no hay estado remoto, sube TODO (deploy largo, como antes) y siembra
      # el estado. A partir de ahí, los deploys de solo código son ~2-3 min.
      #
      # Secuencial por diseño de la librería (basic-ftp, una conexión de datos viva a la
      # vez): NO reproduce la corrupción por canales PASV concurrentes que daba lftp --parallel.
      #
      # Autoload de Composer acoplado por hash: el diff es por CONTENIDO, así que si vendor
      # cambia, TODOS los ficheros del set autoload entran en el delta y se suben juntos (no
      # hay "subo uno y me salto otro"). El orden dentro del delta no está garantizado: hay
      # una ventana de inconsistencia de segundos SOLO cuando cambia vendor; el smoke check
      # de abajo la caza. En deploys de solo código el autoload ni se toca.
      - name: Subir cambios por FTP a staging (delta por hashes)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          local-dir: ./
          server-dir: deploy/staging/
          # Replica los excludes del lftp anterior. OJO: si se define `exclude`, se
          # SOBREESCRIBEN los defaults de la action (.git*, node_modules), por eso van
          # aquí también. El assets/ de RAÍZ (entry point Encore) se excluye anclado;
          # los assets/ anidados de los legacy (bundles/app/.../assets/) SÍ suben.
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            **/.idea/**
            **/.vscode/**
            **/.ddev/**
            **/.claude/**
            **/node_modules/**
            **/tests/**
            backup/**
            handoff/**
            .env.local
            .env.test
            .env.*.local
            var/cache/**
            var/log/**
            var/sessions/**
            CLAUDE.md
            README.md
            RUNBOOK.md
            phpstan.dist.neon
            rector.php
            phpunit.xml*
            package.json
            yarn.lock
            webpack.config.js
            assets/**

      # Invalida el cache compilado de prod en el servidor. En prod Symfony NO recompila
      # plantillas/config al cambiar el fuente: sirve lo que tenga en var/cache/prod (que
      # se excluye de la subida). La action no ejecuta comandos remotos, así que el borrado
      # va con un lftp mínimo (una sola operación, segundos). Symfony lo regenera on-demand
      # en el primer request. -f: no falla si el dir no existe.
      - name: Invalidar cache compilado de prod
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get update && sudo apt-get install -y lftp
          lftp -c "
            set ssl:verify-certificate no;
            set ftp:ssl-allow no;
            open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER;
            rm -rf deploy/staging/var/cache/prod;
          "

      # Verifica que la home responde sana tras el deploy. Caza la corrupcion
      # de ficheros en el transporte (un .php/.twig servido en crudo o un 500)
      # antes de que la descubra una persona. La home es publica (frontend).
      - name: Smoke check post-deploy
        run: |
          code=$(curl -sS -m 30 -o /tmp/resp.html -w '%{http_code}' https://staging.csavegadejarama.org/ || echo 000)
          echo "HTTP $code"
          if [ "$code" != "200" ]; then echo "::error::La home no devuelve 200 (codigo $code)"; exit 1; fi
          if grep -qF '<?php' /tmp/resp.html; then echo "::error::La home sirve PHP en crudo (fichero corrupto en el deploy)"; exit 1; fi
          if ! grep -qiF 'Vega de Jarama' /tmp/resp.html; then echo "::error::La home no contiene el marcador esperado"; exit 1; fi
          echo "Smoke check OK"
