name: Deploy a producción

# Disparo manual desde la pestaña Actions con "Run workflow".
# El auto en push a main se retiró: el flujo es probar primero en staging y,
# cuando esté validado, lanzar este workflow a mano. Se puede reactivar el
# push automático cuando el flujo esté maduro.
on:
  workflow_dispatch:

# Evita que dos pushes seguidos se pisen.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Build y subida por FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, pdo_mysql, gd, exif, iconv
          tools: composer:2.2
          coverage: none

      # Cachea vendor/ entre runs. Si composer.lock no cambia, actions/cache
      # restaura el directorio preservando mtimes y nos saltamos composer
      # install entero — necesario porque incluso un install "sin cambios"
      # toca mtimes (autoloader, vendor/composer/*) y lftp --only-newer
      # reuploadea esos ficheros.
      - name: Cache de vendor/
        id: vendor-cache
        uses: actions/cache@v4
        with:
          path: vendor
          key: vendor-php83-${{ hashFiles('composer.lock') }}

      - name: Composer install (solo deps de producción)
        if: steps.vendor-cache.outputs.cache-hit != 'true'
        env:
          APP_ENV: prod
          APP_DEBUG: '0'
        run: composer install --no-dev --optimize-autoloader --no-interaction --no-progress

      - name: Setup Node 16
        uses: actions/setup-node@v4
        with:
          node-version: '16'

      - name: Compilar assets para producción
        run: |
          npm install --no-audit --no-fund
          npm run build || npm run dev

      - name: Copiar assets legacy (FTP no transmite symlinks)
        run: |
          mkdir -p public/bundles
          rm -rf public/bundles/app
          cp -R src/Resources/public public/bundles/app
          # El repo tiene src/Resources/public/ en 0700 y cp -R lo preserva.
          # Apache en cdmon corre como otro usuario y necesita +rX para servir.
          chmod -R u+rwX,go+rX public/bundles/app

      - name: Instalar lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Subir cambios por FTP (solo lo más nuevo)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          # Excluimos solo el assets/ de RAÍZ (entry point de Webpack Encore),
          # anclado con ^ vía --exclude (regex). Con 'exclude-glob assets/' NO se
          # anclaba y arrastraba los assets/ anidados de los assets legacy (p.ej.
          # bundles/app/frontend/lib/owlcarousel/assets/ → CSS del carrusel 404).
          # OJO: este comentario va FUERA del lftp -c "...": dentro de la cadena,
          # bash no trata # como comentario y se lo pasa a lftp, rompiendo el mirror.
          lftp -c "
            set ssl:verify-certificate no;
            set ftp:ssl-allow no;
            set net:max-retries 3;
            set net:reconnect-interval-base 10;
            set cmd:show-status yes;
            set xfer:log yes;
            open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER;
            # Los ficheros de autoload de Composer llevan un hash acoplado:
            # vendor/autoload.php -> ComposerAutoloaderInit<hash>,
            # autoload_real.php -> ComposerStaticInit<hash>. Al cambiar
            # composer.lock, Composer regenera el set con un hash nuevo. El
            # mirror incremental (compara fecha/tamaño) puede subir uno y
            # saltarse el otro: el set queda desincronizado y la app revienta
            # en el arranque con Class ComposerStaticInit<hash> not found
            # (500 mudo). Los borramos en remoto para forzar que el mirror los
            # re-suba SIEMPRE completos y con el mismo hash. OJO: nada de
            # comillas dobles en este comentario, romperían la cadena lftp -c.
            rm -rf gestion_csa_4/vendor/composer;
            rm -f gestion_csa_4/vendor/autoload.php;
            mirror -R --only-newer --parallel=4 --verbose=2 \
              --exclude-glob '.git*' \
              --exclude-glob '.github/' \
              --exclude-glob '.idea/' \
              --exclude-glob '.vscode/' \
              --exclude-glob '.ddev/' \
              --exclude-glob '.claude/' \
              --exclude-glob 'node_modules/' \
              --exclude-glob 'tests/' \
              --exclude-glob 'backup/' \
              --exclude-glob 'handoff/' \
              --exclude-glob '.env.local' \
              --exclude-glob '.env.test' \
              --exclude-glob '.env.*.local' \
              --exclude-glob 'var/cache/' \
              --exclude-glob 'var/log/' \
              --exclude-glob 'var/sessions/' \
              --exclude-glob 'CLAUDE.md' \
              --exclude-glob 'README.md' \
              --exclude-glob 'RUNBOOK.md' \
              --exclude-glob 'phpstan.dist.neon' \
              --exclude-glob 'rector.php' \
              --exclude-glob 'phpunit.xml*' \
              --exclude-glob 'package.json' \
              --exclude-glob 'yarn.lock' \
              --exclude-glob 'webpack.config.js' \
              --exclude '^assets/' \
              . gestion_csa_4/;
            # Invalida el cache compilado de prod. En prod Symfony NO recompila
            # plantillas/config al cambiar el fuente: sirve lo que tenga en
            # var/cache/prod (que se excluye del FTP). Sin esto, un deploy de
            # código nuevo seguiría sirviendo plantillas viejas o una
            # compilación corrupta. Symfony lo regenera on-demand en el primer
            # request (más lento esa vez). -f: no falla si el dir no existe.
            rm -rf gestion_csa_4/var/cache/prod;
          "
