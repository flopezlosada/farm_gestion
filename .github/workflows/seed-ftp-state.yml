name: Sembrar estado FTP

# Uso ÚNICO antes del primer deploy de un entorno con la action de hashes.
# El FTP de cdmon NO aguanta subir los ~21k ficheros del tirón (se atasca: en
# una prueba subió 2.776 en 2h y se colgó). Por eso el primer deploy no puede
# resubir todo el árbol. Este workflow genera el .ftp-deploy-sync-state.json con
# los hashes (sha256) del contenido que YA está en el servidor (subido por los
# deploys lftp previos) y lo sube; así el primer deploy real sube SOLO el delta.
#
# CLAVE: sembrar desde el commit que está REALMENTE desplegado en ese entorno
# (input `ref`), porque el estado le dice a la action "el servidor ya tiene esto".
# Tras subir el estado, un dry-run del MISMO commit DEBE reportar 0 ficheros a
# subir: prueba de que el estado sembrado es fiel. Si reporta muchos, NO desplegar.
#
# Refs de partida (último deploy exitoso de cada entorno):
#   staging    -> da27caba2b6cf6e519fe30c01b4701e033e7a057
#   production -> f6285e836efb0e5e8526f332e2e1b38b4770c545
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Entorno a sembrar'
        required: true
        type: choice
        options: [staging, production]
        default: staging
      ref:
        description: 'Commit desplegado HOY en ese entorno (último deploy exitoso)'
        required: true

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  seed:
    name: Generar y subir el estado FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del commit desplegado en el entorno
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          # fetch-depth: 0 trae toda la historia: `ref` es un SHA suelto (el commit
          # desplegado, no la punta de una rama) y el checkout superficial por defecto
          # (depth 1) no lo encuentra -> "git failed with exit code 1".
          fetch-depth: 0

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, pdo_mysql, gd, exif, iconv
          tools: composer:2.2
          coverage: none

      - name: Cache de vendor/
        id: vendor-cache
        uses: actions/cache@v4
        with:
          path: vendor
          key: vendor-php83-${{ hashFiles('composer.lock') }}

      # Build IDÉNTICO al del deploy: el estado debe reflejar el mismo árbol que
      # la action calculará al desplegar, o el delta saldría inflado.
      - name: Composer install (solo deps de producción)
        if: steps.vendor-cache.outputs.cache-hit != 'true'
        env:
          APP_ENV: prod
          APP_DEBUG: '0'
        run: composer install --no-dev --optimize-autoloader --no-interaction --no-progress

      - name: Setup Node 16
        uses: actions/setup-node@v4
        with:
          node-version: '16'

      - name: Compilar assets para producción
        run: |
          npm install --no-audit --no-fund
          npm run build || npm run dev

      - name: Copiar assets legacy (FTP no transmite symlinks)
        run: |
          mkdir -p public/bundles
          rm -rf public/bundles/app
          cp -R src/Resources/public public/bundles/app
          chmod -R u+rwX,go+rX public/bundles/app

      # Lista de excludes: DEBE coincidir con el `exclude:` de deploy.yml /
      # deploy-staging.yml. Se escribe a un fichero para el generador del estado.
      - name: Preparar lista de excludes
        run: |
          cat > /tmp/ftp-exclude.txt <<'EXCLUDES'
          **/.git*
          **/.git*/**
          .github/**
          **/.idea/**
          **/.vscode/**
          **/.ddev/**
          **/.claude/**
          **/node_modules/**
          **/tests/**
          backup/**
          handoff/**
          .env.local
          .env.test
          .env.*.local
          var/cache/**
          var/log/**
          var/sessions/**
          CLAUDE.md
          README.md
          RUNBOOK.md
          phpstan.dist.neon
          rector.php
          phpunit.xml*
          package.json
          yarn.lock
          webpack.config.js
          assets/**
          EXCLUDES

      - name: Generar el estado (hashes sha256 del árbol construido)
        run: |
          npm install --no-save --no-audit --no-fund minimatch
          node tools/ftp-seed-state.js \
            --local-dir ./ \
            --exclude-file /tmp/ftp-exclude.txt \
            --out .ftp-deploy-sync-state.json

      - name: Subir SOLO el estado al servidor
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          SERVER_DIR: ${{ inputs.environment == 'production' && 'gestion_csa_4' || 'deploy/staging' }}
        run: |
          sudo apt-get update && sudo apt-get install -y lftp
          lftp -c "
            set ssl:verify-certificate no;
            set ftp:ssl-allow no;
            set xfer:clobber on;
            open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER;
            put .ftp-deploy-sync-state.json -o $SERVER_DIR/.ftp-deploy-sync-state.json;
          "

      # VERIFICACIÓN: dry-run de la action contra el MISMO commit recién sembrado.
      # No sube nada. En los logs debe decir que subiría ~0 ficheros: confirma que
      # el estado casa. Si lista muchos, el sembrado NO es fiable: no desplegar.
      - name: Verificar el sembrado (dry-run, no sube nada)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          local-dir: ./
          server-dir: ${{ inputs.environment == 'production' && 'gestion_csa_4/' || 'deploy/staging/' }}
          dry-run: true
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            **/.idea/**
            **/.vscode/**
            **/.ddev/**
            **/.claude/**
            **/node_modules/**
            **/tests/**
            backup/**
            handoff/**
            .env.local
            .env.test
            .env.*.local
            var/cache/**
            var/log/**
            var/sessions/**
            CLAUDE.md
            README.md
            RUNBOOK.md
            phpstan.dist.neon
            rector.php
            phpunit.xml*
            package.json
            yarn.lock
            webpack.config.js
            assets/**
