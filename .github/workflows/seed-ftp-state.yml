name: Sembrar estado FTP

# Uso ÚNICO antes del primer deploy de un entorno con la action de hashes.
# El FTP de cdmon NO aguanta subir los ~21k ficheros del tirón (se atasca: en
# una prueba subió 2.776 en 2h y se colgó ~1h). Por eso el primer deploy no
# puede resubir todo el árbol. Este workflow genera el .ftp-deploy-sync-state.json
# con los hashes (sha256) del contenido que YA está en el servidor (subido por
# los deploys lftp previos) y lo sube; así el primer deploy real sube SOLO el delta.
#
# CLAVE: sembrar desde el commit que está REALMENTE desplegado en ese entorno
# (input `ref`, SHA COMPLETO de 40 chars — actions/checkout no acepta SHA corto).
# Tras subir el estado, un dry-run del MISMO commit DEBE reportar 0 ficheros a
# subir: prueba de que el estado sembrado es fiel. Si reporta muchos, NO desplegar.
#
# El generador del estado va EMBEBIDO (Python, sin dependencias) a propósito: el
# step se checkoutea sobre el commit desplegado (antiguo), que NO contiene el
# script — embeberlo lo hace independiente del commit y del Node del runner.
#
# Refs de partida (último deploy exitoso de cada entorno):
#   staging    -> da27caba2b6cf6e519fe30c01b4701e033e7a057
#   production -> f6285e836efb0e5e8526f332e2e1b38b4770c545
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Entorno a sembrar'
        required: true
        type: choice
        options: [staging, production]
        default: staging
      ref:
        description: 'SHA COMPLETO (40 chars) del commit desplegado HOY en ese entorno'
        required: true

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  seed:
    name: Generar y subir el estado FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del commit desplegado en el entorno
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          # fetch-depth: 0 trae toda la historia: `ref` es un SHA suelto (el commit
          # desplegado, no la punta de una rama) y el checkout superficial por defecto
          # (depth 1) no lo encuentra.
          fetch-depth: 0

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, pdo_mysql, gd, exif, iconv
          tools: composer:2.2
          coverage: none

      - name: Cache de vendor/
        id: vendor-cache
        uses: actions/cache@v4
        with:
          path: vendor
          key: vendor-php83-${{ hashFiles('composer.lock') }}

      # Build IDÉNTICO al del deploy: el estado debe reflejar el mismo árbol que
      # la action calculará al desplegar, o el delta saldría inflado.
      - name: Composer install (solo deps de producción)
        if: steps.vendor-cache.outputs.cache-hit != 'true'
        env:
          APP_ENV: prod
          APP_DEBUG: '0'
        run: composer install --no-dev --optimize-autoloader --no-interaction --no-progress

      - name: Setup Node 16
        uses: actions/setup-node@v4
        with:
          node-version: '16'

      - name: Compilar assets para producción
        run: |
          npm install --no-audit --no-fund
          npm run build || npm run dev

      - name: Copiar assets legacy (FTP no transmite symlinks)
        run: |
          mkdir -p public/bundles
          rm -rf public/bundles/app
          cp -R src/Resources/public public/bundles/app
          chmod -R u+rwX,go+rX public/bundles/app

      # Generador EMBEBIDO (Python, ya viene en el runner; sin npm install). Recorre
      # el árbol construido, aplica los MISMOS excludes que deploy(-staging).yml y
      # emite el estado con el formato de @samkirkland/ftp-deploy: version "1.0.0",
      # entradas file {type,name,size,hash} y folder {type,name}, sha256 hex, rutas
      # relativas con '/'. Poda dirs cuyo contenido entero está excluido (node_modules…).
      - name: Generar el estado (hashes sha256 del árbol construido)
        run: |
          python3 - <<'PY'
          import os, hashlib, json, re

          EXCLUDES = [
            "**/.git*", "**/.git*/**", ".github/**", "**/.idea/**", "**/.vscode/**",
            "**/.ddev/**", "**/.claude/**", "**/node_modules/**", "**/tests/**",
            "backup/**", "handoff/**", ".env.local", ".env.test", ".env.*.local",
            "var/cache/**", "var/log/**", "var/sessions/**", "CLAUDE.md", "README.md",
            "RUNBOOK.md", "phpstan.dist.neon", "rector.php", "phpunit.xml*",
            "package.json", "yarn.lock", "webpack.config.js", "assets/**",
          ]

          def glob_to_regex(glob):
              out = ["^"]; i = 0; n = len(glob)
              while i < n:
                  c = glob[i]
                  if c == "*":
                      if i + 1 < n and glob[i + 1] == "*":
                          if i + 2 < n and glob[i + 2] == "/":
                              out.append("(?:.*/)?"); i += 3; continue
                          out.append(".*"); i += 2; continue
                      out.append("[^/]*"); i += 1; continue
                  if c == "?":
                      out.append("[^/]")
                  elif c in ".+()[]{}^$|\\":
                      out.append("\\" + c)
                  else:
                      out.append(c)
                  i += 1
              out.append("$")
              return re.compile("".join(out))

          RX = [glob_to_regex(p) for p in EXCLUDES]
          excluded = lambda rel: any(r.match(rel) for r in RX)
          # poda un dir si él o su contenido entero están excluidos (p.ej. node_modules/**)
          prune = lambda rel: excluded(rel) or any(r.match(rel + "/__probe__") for r in RX)

          records = []
          for root, dirs, files in os.walk("."):
              rel_root = os.path.relpath(root, ".").replace(os.sep, "/")
              if rel_root == ".":
                  rel_root = ""
              kept = []
              for d in sorted(dirs):
                  rel = f"{rel_root}/{d}" if rel_root else d
                  if prune(rel):
                      continue
                  kept.append(d)
                  records.append({"type": "folder", "name": rel})
              dirs[:] = kept
              for f in sorted(files):
                  rel = f"{rel_root}/{f}" if rel_root else f
                  if excluded(rel):
                      continue
                  p = os.path.join(root, f)
                  with open(p, "rb") as fh:
                      h = hashlib.sha256(fh.read()).hexdigest()
                  records.append({"type": "file", "name": rel, "size": os.path.getsize(p), "hash": h})

          state = {
            "description": "DO NOT DELETE THIS FILE. This file is used to keep track of which files have been synced in the most recent deployment. If you delete this file a resync will need to be done (which can take a while) - read more: https://github.com/SamKirkland/FTP-Deploy-Action",
            "version": "1.0.0",
            "generatedTime": 0,
            "data": records,
          }
          with open(".ftp-deploy-sync-state.json", "w") as fh:
              json.dump(state, fh, separators=(",", ":"))

          nf = sum(1 for r in records if r["type"] == "file")
          nd = sum(1 for r in records if r["type"] == "folder")
          print(f"Estado generado: {nf} ficheros, {nd} carpetas")
          PY

      - name: Subir SOLO el estado al servidor
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          SERVER_DIR: ${{ inputs.environment == 'production' && 'gestion_csa_4' || 'deploy/staging' }}
        run: |
          sudo apt-get update && sudo apt-get install -y lftp
          lftp -c "
            set ssl:verify-certificate no;
            set ftp:ssl-allow no;
            set xfer:clobber on;
            open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER;
            put .ftp-deploy-sync-state.json -o $SERVER_DIR/.ftp-deploy-sync-state.json;
          "

      # VERIFICACIÓN: dry-run de la action contra el MISMO commit recién sembrado.
      # No sube nada. En los logs debe decir que subiría ~0 ficheros: confirma que
      # el estado casa. Si lista muchos, el sembrado NO es fiable: no desplegar.
      - name: Verificar el sembrado (dry-run, no sube nada)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          local-dir: ./
          server-dir: ${{ inputs.environment == 'production' && 'gestion_csa_4/' || 'deploy/staging/' }}
          dry-run: true
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            **/.idea/**
            **/.vscode/**
            **/.ddev/**
            **/.claude/**
            **/node_modules/**
            **/tests/**
            backup/**
            handoff/**
            .env.local
            .env.test
            .env.*.local
            var/cache/**
            var/log/**
            var/sessions/**
            CLAUDE.md
            README.md
            RUNBOOK.md
            phpstan.dist.neon
            rector.php
            phpunit.xml*
            package.json
            yarn.lock
            webpack.config.js
            assets/**
