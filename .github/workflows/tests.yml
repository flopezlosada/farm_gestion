name: Tests

# Gate de regresión: corre la suite PHPUnit en cada push y PR. No despliega.
# La batería de reparto (app:verify-delivery-battery) NO va aquí: muta la BBDD
# y depende del golden real; su sitio es manual sobre db_play.
on:
  push:
  pull_request:

# Un push nuevo sobre la misma rama cancela el run anterior en vuelo.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  phpunit:
    name: PHPUnit sobre db_test
    runs-on: ubuntu-latest

    env:
      APP_ENV: test
      APP_DEBUG: '0'
      # En CI MySQL es un service en 127.0.0.1, no el host "db" de DDEV. Esta env
      # var REAL pisa el DATABASE_URL de .env.test (Symfony Dotenv no sobrescribe
      # variables de entorno reales), así que phpunit y bin/console apuntan a db_test.
      DATABASE_URL: 'mysql://root:root@127.0.0.1:3306/db_test?serverVersion=8.0'
      MAILER_DSN: 'null://null'
      SYMFONY_DEPRECATIONS_HELPER: 999999

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: db_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, pdo_mysql, gd, exif, iconv
          tools: composer:2.2
          coverage: none

      # Cachea vendor/ entre runs si composer.lock no cambia.
      - name: Cache de vendor/
        uses: actions/cache@v4
        with:
          path: vendor
          key: vendor-test-php83-${{ hashFiles('composer.lock') }}

      # CON dev: la suite necesita phpunit y doctrine-fixtures-bundle.
      - name: Composer install
        run: composer install --optimize-autoloader --no-interaction --no-progress

      - name: Setup Node 16
        uses: actions/setup-node@v4
        with:
          node-version: '16'

      # Las pantallas (login, /gestion, /panel) renderizan con Webpack Encore;
      # sin el build, encore_entry_* falla al no encontrar entrypoints.json.
      - name: Compilar assets
        run: |
          npm install --no-audit --no-fund
          npm run dev || npm run build

      # El código viejo tiene queries con GROUP BY incompletos; DDEV desactiva el
      # modo estricto vía .ddev/mysql/no_strict_group_by.cnf. Lo replicamos a nivel
      # global del servidor (afecta a las conexiones nuevas que abren los tests).
      - name: Desactivar ONLY_FULL_GROUP_BY en MySQL
        run: |
          sudo apt-get update && sudo apt-get install -y mysql-client
          mysql -h 127.0.0.1 -uroot -proot -e "SET GLOBAL sql_mode=(SELECT REPLACE(@@sql_mode,'ONLY_FULL_GROUP_BY',''));"

      # Esquema desde las entidades (no usamos migrations como fuente de verdad).
      - name: Crear esquema de db_test
        run: php bin/console doctrine:schema:create --no-interaction

      # Los tests funcionales NO cargan fixtures: asumen db_test ya sembrada
      # (admin/admin de UserFixtures, catálogos, socixs). Las cargamos aquí.
      - name: Cargar fixtures en db_test
        run: php bin/console doctrine:fixtures:load --no-interaction

      - name: PHPUnit
        run: php bin/phpunit
