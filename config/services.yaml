# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices/configuration.html#application-related-configuration
parameters:
    # Umbral de la regla BalanceWithinThresholdRule: máxima diferencia
    # permitida de cestas entre dos viernes consecutivos tras aplicar un
    # shift. Default operativo 3 (en .env). Override en .env.local para
    # entornos de desarrollo con datasets desbalanceados.
    app.delivery.balance_threshold: '%env(int:BALANCE_THRESHOLD)%'

    # Inactividad máxima (segundos) antes de cerrar la sesión de un usuario
    # autenticado. 7200 = 2h. La caduca SessionIdleTimeoutSubscriber a nivel de
    # aplicación, sin depender del GC de ficheros de PHP (best-effort y muerto
    # en el contenedor).
    app.session.max_idle_time: 7200

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/*'
        exclude: '../src/{DependencyInjection,Entity,Migrations,Tests,Kernel.php}'

    # controllers are imported separately to make sure services can be injected
    # as action arguments even if you don't extend any base controller class
    App\Controller\:
        resource: '../src/Controller'
        tags: ['controller.service_arguments']

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
    App\EventListener\CalendarEventListener:
            tags:
                - { name: kernel.event_listener, event: calendar.load_events, method: loadEvents }

    App\EventSubscriber\CalendarSubscriber:

    # SF 7 ya no registra annotation_reader automáticamente. Las entidades
    # Doctrine siguen mapeadas con docblock annotations (74 entidades). Cuando
    # se migren a attributes PHP 8 + Doctrine ORM 3, este servicio se quita
    # y el driver de doctrine.yaml pasa a 'attribute'.
    Doctrine\Common\Annotations\AnnotationReader: ~
    annotation_reader:
        alias: Doctrine\Common\Annotations\AnnotationReader
        public: true

    Twig\Extra\Intl\IntlExtension:
        tags: ['twig.extension']

    Twig\Extra\String\StringExtension:
        tags: ['twig.extension']

    ADesigns\CalendarBundle\Controller\CalendarController:
        tags: ['controller.service_arguments']

    App\Service\Delivery\Rule\BalanceWithinThresholdRule:
        arguments:
            $threshold: '%app.delivery.balance_threshold%'

    App\EventSubscriber\SessionIdleTimeoutSubscriber:
        arguments:
            $maxIdleTime: '%app.session.max_idle_time%'