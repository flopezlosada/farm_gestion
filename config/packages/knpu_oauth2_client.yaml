knpu_oauth2_client:
    clients:
        # SSO de socixs con Google. client_id/secret vienen del entorno; en
        # prod se compilan con `composer dump-env prod` → .env.local.php (chmod
        # 600), no en texto plano. La redirect_route es el callback que
        # intercepta GoogleAuthenticator.
        google:
            type: google
            client_id: '%env(GOOGLE_CLIENT_ID)%'
            client_secret: '%env(GOOGLE_CLIENT_SECRET)%'
            redirect_route: connect_google_check
            redirect_params: {}
