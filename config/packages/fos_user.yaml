fos_user:
    db_driver: orm # other valid values are 'mongodb', 'couchdb' and 'propel'
    firewall_name: main
    user_class: App\Entity\User
    # FOSUser 3.x sigue acoplado a SwiftMailer, que ya no usamos. Como el flujo
    # de registro/confirmation por email no se utiliza en este proyecto (la
    # auth se reescribe en Fase 7), forzamos el noop mailer y desactivamos la
    # confirmación.
    service:
        mailer: fos_user.mailer.noop
    from_email:
        address:        info@csavegadejarama.org
        sender_name:    CSA  Vega de Jarama
    registration:
      confirmation:
        enabled:    false
