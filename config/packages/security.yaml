security:
    password_hashers:
        # Hasher legacy de FOSUser: sha512 con salt, 5000 iteraciones, base64.
        # Mantener para validar contraseñas migradas del dump de prod.
        # Symfony rehashea automáticamente al primer login con éxito.
        legacy_fos_sha512:
            algorithm: sha512
            encode_as_base64: true
            iterations: 5000
        App\Entity\User:
            algorithm: auto
            migrate_from:
                - legacy_fos_sha512

    # ===========================================================
    # ROLES DEL PROYECTO
    # ===========================================================
    # Los roles son flags independientes — un User puede tener una
    # combinación cualquiera. NO hay jerarquía entre los roles de
    # gestión (tener ROLE_GESTION_GRANJA no implica tener ROLE_BLOG).
    #
    # El único atajo es ROLE_ADMIN, que se interpreta como "alias"
    # que incluye todos los demás. Es por conveniencia: crear un
    # admin = darle ROLE_ADMIN sin tener que listar 5 roles.
    #
    # Roles activos:
    #   ROLE_ADMIN              acceso a todo (alias de todos los demás)
    #   ROLE_GESTION_GRANJA     lotes, gallinas, cosechas, gastos granja
    #   ROLE_GESTION_SOCIXS     alta/baja/edición de Partner
    #   ROLE_GESTION_CESTAS     reparto semanal, baskets, shares
    #   ROLE_BLOG               blog público (admin) + categorías + media
    #   ROLE_PARTNER            panel propio del socix
    #
    # ROLE_COOP es legacy (FOSUser); se acepta temporalmente en
    # access_control para no echar a usuarios existentes mientras
    # migramos. Cuando todos los users tengan los roles nuevos en
    # BBDD, se elimina.
    # ===========================================================
    role_hierarchy:
        ROLE_ADMIN:
            - ROLE_GESTION_GRANJA
            - ROLE_GESTION_SOCIXS
            - ROLE_GESTION_CESTAS
            - ROLE_BLOG
            - ROLE_PARTNER

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: username

    firewalls:
        main:
            pattern: ^/
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                default_target_path: /gestion/dashboard
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800
                path: /
            logout:
                path: app_logout
                target: /

    access_control:
        - { path: ^/login$, roles: PUBLIC_ACCESS }
        - { path: ^/contact$, roles: PUBLIC_ACCESS }
        # Cualquier rol de gestión (o el legacy ROLE_COOP, hasta que migremos) permite entrar a /gestion.
        # Dentro, cada controller filtra con #[IsGranted('ROLE_GESTION_X')] según su sección.
        - { path: ^/gestion,
            roles: [ROLE_ADMIN, ROLE_GESTION_GRANJA, ROLE_GESTION_SOCIXS, ROLE_GESTION_CESTAS, ROLE_BLOG, ROLE_COOP] }
        # Panel del socix (lo construiremos en breve).
        - { path: ^/panel, roles: [ROLE_PARTNER, ROLE_ADMIN] }
