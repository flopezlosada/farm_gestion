security:
    password_hashers:
        # Hasher legacy de FOSUser: sha512 con salt, 5000 iteraciones, base64.
        # Mantener para validar contraseñas migradas del dump de prod.
        # Symfony rehashea automáticamente al primer login con éxito.
        legacy_fos_sha512:
            algorithm: sha512
            encode_as_base64: true
            iterations: 5000
        App\Entity\User:
            algorithm: auto
            migrate_from:
                - legacy_fos_sha512

    # ===========================================================
    # ROLES DEL PROYECTO
    # ===========================================================
    # Los roles son flags independientes — un User puede tener una
    # combinación cualquiera. NO hay jerarquía entre los roles de
    # gestión (tener ROLE_GESTION_GRANJA no implica tener ROLE_BLOG).
    #
    # El único atajo es ROLE_ADMIN, que se interpreta como "alias"
    # que incluye todos los demás. Es por conveniencia: crear un
    # admin = darle ROLE_ADMIN sin tener que listar 5 roles.
    #
    # Roles activos:
    #   ROLE_ADMIN              acceso a todo (alias de todos los demás)
    #   ROLE_GESTION_GRANJA     lotes, gallinas, cosechas, gastos granja,
    #                           composición de las cestas cosechadas (Basket)
    #   ROLE_GESTION_SOCIXS     alta/baja/edición de Partner + su cesta (PartnerBasketShare)
    #   ROLE_GESTION_REPARTO    logística de entrega: reparto semanal, nodos,
    #                           grupos de recogida, excepciones, histórico de cambios
    #   ROLE_BLOG               blog público (admin) + categorías + media
    #   ROLE_GESTION_ENCUESTAS  LECTURA de encuestas internas: ver encuestas y
    #                           resultados AGREGADOS (no da acceso a datos
    #                           personales de socixs: mínimo privilegio,
    #                           separado a propósito de ROLE_GESTION_SOCIXS)
    #   ROLE_GESTION_ENCUESTAS_EDIT  ESCRITURA de encuestas (crear/editar/abrir/
    #                           cerrar/borrar/archivar; incluye lectura por
    #                           jerarquía). Mismo modelo que el albergue.
    #   ROLE_GESTION_ALBERGUE   LECTURA del albergue (helpers, estancias y
    #                           aforo mensual). Separado de socixs: son
    #                           personas y datos distintos
    #   ROLE_GESTION_ALBERGUE_EDIT  ESCRITURA del albergue (incluye lectura por
    #                           jerarquía). Piloto del modelo lectura/escritura
    #                           por sección: la lectura la da el rol base y la
    #                           escritura el sufijo _EDIT. Sin ninguno = sin
    #                           acceso. La escritura se exige a nivel de método
    #                           HTTP en access_control (ver más abajo), sin
    #                           tocar los controllers.
    #   ROLE_PARTNER            panel propio del socix
    # ===========================================================
    role_hierarchy:
        ROLE_ADMIN:
            - ROLE_GESTION_GRANJA
            - ROLE_GESTION_SOCIXS
            - ROLE_GESTION_REPARTO
            - ROLE_BLOG
            - ROLE_GESTION_ENCUESTAS_EDIT
            - ROLE_GESTION_ALBERGUE_EDIT
            - ROLE_PARTNER
        # La escritura incluye la lectura (modelo lectura/escritura por sección).
        ROLE_GESTION_ALBERGUE_EDIT:
            - ROLE_GESTION_ALBERGUE
        ROLE_GESTION_ENCUESTAS_EDIT:
            - ROLE_GESTION_ENCUESTAS

    providers:
        # Sin "property": Symfony delega en UserRepository::loadUserByIdentifier
        # (UserLoaderInterface), que busca contra usernameCanonical OR
        # emailCanonical, ambos lowercased. Así el login es case-insensitive
        # y el socix puede entrar tanto con su username como con su email.
        app_user_provider:
            entity:
                class: App\Entity\User

    firewalls:
        main:
            pattern: ^/
            lazy: true
            provider: app_user_provider
            # Rechaza el login de cuentas bloqueadas (enabled = false). Sin esto
            # el bloqueo no surtiría efecto: Symfony no mira `enabled` por su cuenta.
            user_checker: App\Security\UserChecker
            # Bloquea fuerza bruta contra /login. 5 intentos fallidos por
            # minuto desde la misma IP/username; tras eso, Symfony devuelve
            # TooManyLoginAttemptsAuthenticationException hasta que la
            # ventana se vacía. Failed attempts trackeados en cache.app.
            # Los logins con éxito resetean el contador.
            login_throttling:
                max_attempts: 5
                interval: '1 minute'
            form_login:
                login_path: app_login
                check_path: /login
                enable_csrf: true
                # Dispatcher común: app_post_login decide a dónde mandar al
                # User según sus roles (gestión → /gestion/dashboard,
                # socix → /panel). Evita 403 al loguear un socix con
                # password.
                default_target_path: /post-login
            # Magic-link sin contraseña pensado para la brecha digital del
            # colectivo: socixs que no recuerdan password reciben un link en
            # su correo y entran al panel. Coexiste con form_login.
            #
            #   lifetime  - el link expira a los 30 min de generarse (es más
            #               generoso que el default de 10 min para gente que
            #               no abre el correo al instante).
            #   max_uses  - un solo uso por link (si se reenvía o se hace
            #               click dos veces, el segundo falla).
            #   signature_properties: id solo. Lo firmamos por id porque
            #               cambiar username/email no debería invalidar un
            #               link válido en vuelo (no es información segura
            #               como password, que sí firmaría).
            login_link:
                check_route: app_login_link_check
                signature_properties: [id]
                lifetime: 1800
                max_uses: 1
                default_target_path: /post-login
                always_use_default_target_path: true
            # SSO con Google (socixs). Lazy provisioning condicionado a que el
            # email verificado case con exactamente un socix activo.
            custom_authenticators:
                - App\Security\GoogleAuthenticator
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800
                path: /
            logout:
                path: app_logout
                target: /

    access_control:
        # ^/login cubre /login, /login/magic (request), /login/magic/check
        # (callback del link) y /login/magic/enviado (pantalla intermedia).
        - { path: ^/login, roles: PUBLIC_ACCESS }
        # ^/connect cubre el arranque y el callback del SSO de Google. Públicas:
        # el login lo resuelve GoogleAuthenticator tras volver de Google.
        - { path: ^/connect, roles: PUBLIC_ACCESS }
        # Dispatcher post-login: accesible a cualquier cuenta autenticada,
        # incluida la sesión recordada (remember_me). Solo redirige por rol a
        # /gestion/dashboard o /panel — no expone nada sensible, y ambos
        # destinos están gateados por su cuenta. DEBE ser IS_AUTHENTICATED_REMEMBERED
        # y no _FULLY: con _FULLY, un usuario que vuelve solo con la cookie
        # remember_me (sin sesión, p.ej. tras limpiar el cache del servidor)
        # entra en bucle infinito — /login ve getUser() y manda a /post-login,
        # /post-login exige _FULLY y rebota a /login. Coherente con ^/account.
        - { path: ^/post-login$, roles: IS_AUTHENTICATED_REMEMBERED }
        # Pantalla de (re)establecer contraseña: cualquier cuenta autenticada
        # (incluida sesión recordada) para no encerrar a quien llega con
        # remember_me. La protege ForcePasswordChangeSubscriber, que reconduce
        # aquí a quien tenga passwordSet = false.
        - { path: ^/account, roles: IS_AUTHENTICATED_REMEMBERED }
        - { path: ^/contact$, roles: PUBLIC_ACCESS }
        # Albergue (piloto lectura/escritura por sección): la lectura la da
        # ROLE_GESTION_ALBERGUE (vía el #[IsGranted] de clase y la regla
        # ^/gestion de abajo); la ESCRITURA se exige aquí a nivel de método
        # HTTP. Toda mutación del albergue es POST/PUT/PATCH/DELETE, así que
        # esta única regla protege el alta/edición/borrado/aforo sin tocar
        # los controllers. DEBE ir antes de la regla genérica ^/gestion
        # (access_control aplica la PRIMERA regla que casa path + método).
        - { path: ^/gestion/albergue, methods: [POST, PUT, PATCH, DELETE], roles: ROLE_GESTION_ALBERGUE_EDIT }
        # Encuestas (mismo modelo): lectura = ver encuestas y resultados; la
        # escritura (crear/editar/abrir/cerrar/borrar/archivar, todo POST) exige
        # _EDIT. También debe ir antes de la regla genérica ^/gestion.
        - { path: ^/gestion/surveys, methods: [POST, PUT, PATCH, DELETE], roles: ROLE_GESTION_ENCUESTAS_EDIT }
        # Cualquier rol de gestión permite entrar a /gestion. Dentro,
        # cada controller filtra con #[IsGranted('ROLE_GESTION_X')] según
        # su sección.
        - { path: ^/gestion,
            roles: [ROLE_ADMIN, ROLE_GESTION_GRANJA, ROLE_GESTION_SOCIXS, ROLE_GESTION_REPARTO, ROLE_BLOG, ROLE_GESTION_ENCUESTAS, ROLE_GESTION_ALBERGUE] }
        # Panel del socix (lo construiremos en breve).
        - { path: ^/panel, roles: [ROLE_PARTNER, ROLE_ADMIN] }
