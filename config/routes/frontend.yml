frontend_blog:
    controller: App\Controller\BlogController::frontend_index
    path: /blog

blog_show:
    controller: App\Controller\BlogController::show
    path: /blog/{slug}

blog_category_show:
    controller: App\Controller\BlogController::show_category
    path: /blog/category/{id}

# Detalle público de un evento de la agenda. La antigua booking_calendar_show
# apuntaba a BookingController::show, que está tras el IsGranted(ROLE_BLOG) de
# clase: para un visitante anónimo nunca funcionó.
evento_show:
    controller: App\Controller\FrontendController::evento
    path: /evento/{id}
    requirements: { id: '\d+' }

app_contact:
    controller: App\Controller\GestionController::contacted
    path: /contact
    methods: [POST]

# Páginas estáticas del frontend público — sirven directamente un template,
# sin controller PHP. Las URLs se preservan tal cual estaban en prod.
huerta:
    path: /lahuerta
    controller: Symfony\Bundle\FrameworkBundle\Controller\TemplateController
    defaults: { template: 'frontend/huerta.html.twig' }

nuestroFuturo:
    path: /nuestrofuturo
    controller: Symfony\Bundle\FrameworkBundle\Controller\TemplateController
    defaults: { template: 'frontend/nuestro_futuro.html.twig' }

voluntariado:
    path: /voluntariado
    controller: Symfony\Bundle\FrameworkBundle\Controller\TemplateController
    defaults: { template: 'frontend/voluntariado.html.twig' }

# /asambleas dejó de ser estática: pinta la agenda de eventos públicos.
asambleas:
    path: /asambleas
    controller: App\Controller\FrontendController::asambleas

somos:
    path: /quienessomos
    controller: Symfony\Bundle\FrameworkBundle\Controller\TemplateController
    defaults: { template: 'frontend/quienes_somos.html.twig' }

# /socio dejó de ser estática: necesita los horarios públicos de los nodos.
socios:
    path: /socio
    controller: App\Controller\FrontendController::socios

cambiocesta:
    path: /cambiocesta
    controller: Symfony\Bundle\FrameworkBundle\Controller\TemplateController
    defaults: { template: 'frontend/cambiocesta.html.twig' }
