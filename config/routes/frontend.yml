frontend_blog:
    controller: App\Controller\BlogController::frontend_index
    path: /blog

blog_show:
    controller: App\Controller\BlogController::show
    path: /blog/{slug}

blog_category_show:
    controller: App\Controller\BlogController::show_category
    path: /blog/category/{id}

booking_calendar_show:
    controller: App\Controller\BookingController::show
    path: /booking/{id}

app_contact:
    controller: App\Controller\GestionController::contacted
    path: /contact
    methods: [POST]

# Páginas estáticas del frontend público — sirven directamente un template,
# sin controller PHP. Las URLs se preservan tal cual estaban en prod.
huerta:
    path: /lahuerta
    controller: Symfony\Bundle\FrameworkBundle\Controller\TemplateController
    defaults: { template: 'frontend/huerta.html.twig' }

nuestroFuturo:
    path: /nuestrofuturo
    controller: Symfony\Bundle\FrameworkBundle\Controller\TemplateController
    defaults: { template: 'frontend/nuestro_futuro.html.twig' }

voluntariado:
    path: /voluntariado
    controller: Symfony\Bundle\FrameworkBundle\Controller\TemplateController
    defaults: { template: 'frontend/voluntariado.html.twig' }

asambleas:
    path: /asambleas
    controller: Symfony\Bundle\FrameworkBundle\Controller\TemplateController
    defaults: { template: 'frontend/asambleas.html.twig' }

somos:
